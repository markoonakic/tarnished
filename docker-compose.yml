services:
  app:
    image: ${TARNISHED_IMAGE:-ghcr.io/markoonakic/tarnished:latest}
    ports:
      - "${APP_PORT:-5577}:5577"
    volumes:
      - ./data:/app/data
    environment:
      - APP_URL=${APP_URL:-http://localhost:5577}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5577/health')"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
