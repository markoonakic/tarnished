# -- Number of replicas. Must be 1 when using SQLite (default).
# Multiple replicas require PostgreSQL plus shared upload storage
# (ReadWriteMany PVC, or an existing shared claim with persistence.sharedAccess=true).
replicaCount: 1

image:
  # -- Container image repository
  repository: ghcr.io/markoonakic/tarnished
  # -- Container image tag (defaults to .Chart.AppVersion if empty)
  tag: ""
  # -- Image pull policy
  pullPolicy: IfNotPresent

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- Automount API credentials. Leave false unless the app must call the Kubernetes API.
  automount: false
  # -- ServiceAccount annotations
  annotations: {}
  # -- ServiceAccount name (generated if empty)
  name: ""

# -- Pod-level annotations (e.g. prometheus.io/scrape)
podAnnotations: {}

# -- Pod-level labels
podLabels: {}

# -- Pod security context applied to Tarnished pods and the migration init container.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# -- Container security context applied to the Tarnished app container and migration init container.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # App writes to /app/data
  capabilities:
    drop: ["ALL"]

service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 5577

ingress:
  # -- Enable ingress
  enabled: false
  # -- Ingress class name (e.g. "nginx", "traefik")
  className: ""
  # -- Ingress annotations (e.g. cert-manager, nginx config)
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  # -- Hostname
  host: tarnished.local
  # -- Ingress paths
  paths:
    - path: /
      pathType: Prefix
  tls:
    # -- Enable TLS
    enabled: false
    # -- TLS secret name (cert-manager auto-creates if annotations set)
    secretName: tarnished-tls

persistence:
  # -- Enable persistent storage
  enabled: true
  # -- Storage class (empty = cluster default)
  storageClass: ""
  # -- PVC size
  size: 1Gi
  # -- Access mode for chart-managed PVCs.
  # SQLite should stay on ReadWriteOnce. Multiple replicas require shared write access.
  accessMode: ReadWriteOnce
  # -- Use an existing PVC instead of creating one
  existingClaim: ""
  # -- Acknowledge that the chosen existing claim supports shared read-write access
  # across replicas. Required when replicaCount > 1 and using existingClaim.
  sharedAccess: false
  # -- Annotations applied to the chart-managed PVC.
  annotations:
    # Prevent PVC deletion on helm uninstall
    helm.sh/resource-policy: keep

postgresql:
  # -- Enable external PostgreSQL (disables SQLite)
  enabled: false
  # -- PostgreSQL host
  host: ""
  # -- PostgreSQL port
  port: 5432
  # -- Database name
  database: tarnished
  # -- Database user
  user: tarnished
  # -- Database password (ignored if existingSecret is set)
  password: ""
  # -- Use an existing Kubernetes Secret for PostgreSQL credentials
  # Secret must contain: password (URL encoding NOT required - app handles it)
  existingSecret: ""
  # -- Key within the existing secret for the password
  existingSecretPasswordKey: "password"

secretKey:
  # -- Use an existing Kubernetes Secret for SECRET_KEY
  # If empty, the app auto-generates a key on first run
  existingSecret: ""
  # -- Key within the existing secret
  existingSecretKey: "secret-key"

# -- Additional environment variables
env: []
  # - name: APP_URL
  #   value: https://jobs.example.com

# -- Extra hostnames allowed by TrustedHostMiddleware.
# These are appended to localhost/test defaults and the APP_URL hostname.
trustedHosts: []
  # - tarnished.tarnished.svc.cluster.local

# -- Additional environment variables from ConfigMaps/Secrets
envFrom: []

# -- Resource requests and limits for the Tarnished app container.
resources:
  requests:
    # -- Memory request for the Tarnished app container.
    memory: "256Mi"
    # -- CPU request for the Tarnished app container.
    cpu: "100m"
  limits:
    # -- Memory limit for the Tarnished app container.
    memory: "512Mi"
    # -- CPU limit for the Tarnished app container.
    cpu: "500m"

# -- Configuration for the migration init container.
initContainer:
  resources:
    requests:
      # -- Memory request for the migration init container.
      memory: "128Mi"
      # -- CPU request for the migration init container.
      cpu: "50m"
    limits:
      # -- Memory limit for the migration init container.
      memory: "256Mi"
      # -- CPU limit for the migration init container.
      cpu: "200m"

# -- Liveness probe for the Tarnished app container.
livenessProbe:
  httpGet:
    # -- HTTP path used by the liveness probe.
    path: /health
    # -- Named port used by the liveness probe.
    port: http
    httpHeaders:
      - name: Host
        value: localhost
  # -- Initial delay before Kubernetes starts running the liveness probe.
  initialDelaySeconds: 30
  # -- Interval between liveness probe executions.
  periodSeconds: 10
  # -- Timeout for each liveness probe execution.
  timeoutSeconds: 5
  # -- Consecutive failures required before the liveness probe fails.
  failureThreshold: 3

# -- Readiness probe for the Tarnished app container.
readinessProbe:
  httpGet:
    # -- HTTP path used by the readiness probe.
    path: /health
    # -- Named port used by the readiness probe.
    port: http
    httpHeaders:
      - name: Host
        value: localhost
  # -- Initial delay before Kubernetes starts running the readiness probe.
  initialDelaySeconds: 10
  # -- Interval between readiness probe executions.
  periodSeconds: 5
  # -- Timeout for each readiness probe execution.
  timeoutSeconds: 3
  # -- Consecutive failures required before the readiness probe fails.
  failureThreshold: 3

# -- Startup probe for the Tarnished app container.
startupProbe:
  httpGet:
    # -- HTTP path used by the startup probe.
    path: /health
    # -- Named port used by the startup probe.
    port: http
    httpHeaders:
      - name: Host
        value: localhost
  # -- Interval between startup probe executions.
  periodSeconds: 5
  # -- Timeout for each startup probe execution.
  timeoutSeconds: 3
  # -- Consecutive failures required before the startup probe fails.
  failureThreshold: 12

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- Configuration for the optional upload cleanup CronJob.
cleanup:
  # -- Enable a Kubernetes CronJob that runs upload cleanup.
  # Disabled by default; the cleanup command remains available manually for all deployment modes.
  enabled: false
  # -- Cron schedule for the cleanup job.
  schedule: "0 3 * * *"
  # -- CronJob time zone.
  timeZone: "Etc/UTC"
  # -- Cleanup mode: "dry-run" reports only, "delete" removes orphaned CAS blobs.
  mode: dry-run
  # -- Keep recent successful jobs.
  successfulJobsHistoryLimit: 1
  # -- Keep recent failed jobs.
  failedJobsHistoryLimit: 1
  # -- How long Kubernetes may delay a missed start before skipping it.
  startingDeadlineSeconds: 600
  # -- Resource requests and limits for the cleanup CronJob container.
  resources:
    requests:
      # -- CPU request for the cleanup CronJob container.
      cpu: 10m
      # -- Memory request for the cleanup CronJob container.
      memory: 16Mi
    limits:
      # -- CPU limit for the cleanup CronJob container.
      cpu: 50m
      # -- Memory limit for the cleanup CronJob container.
      memory: 32Mi
