name: CI

on:
  pull_request:
    branches: [main]

# Cancel old runs when new commits pushed to same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9

      - name: Install dependencies
        working-directory: backend
        run: uv sync

      - name: Ruff check
        working-directory: backend
        run: uv run ruff check

      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check

      - name: Pyright
        working-directory: backend
        run: uv run pyright

      - name: Bandit
        working-directory: backend
        run: uv run bandit -c pyproject.toml -r app

      - name: Security audit
        working-directory: backend
        run: |
          uv export --no-dev --no-hashes -o requirements.txt
          # Ignore CVE-2024-23342 (ecdsa): App uses HS256 for JWTs, not ECDSA
          # Ignore CVE-2026-4539 (pygments): transitive dependency used for formatting / rich output,
          # no patched release is currently available in our dependency graph
          uv tool run pip-audit -r requirements.txt --no-deps --disable-pip --ignore-vuln CVE-2024-23342 --ignore-vuln CVE-2026-4539

      - name: Run tests
        working-directory: backend
        run: uv run pytest

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9

      - name: Install dependencies
        working-directory: cli
        run: uv sync

      - name: Ruff check
        working-directory: cli
        run: uv run ruff check src tests

      - name: Ruff format check
        working-directory: cli
        run: uv run ruff format --check src tests

      - name: Pyright
        working-directory: cli
        run: uv run pyright src tests

      - name: Run tests
        working-directory: cli
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Cache yarn dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            ~/.cache/node
            frontend/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('frontend/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --immutable

      - name: ESLint
        working-directory: frontend
        run: yarn lint

      - name: Prettier check
        working-directory: frontend
        run: npx prettier --check .

      - name: TypeScript
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Vitest
        working-directory: frontend
        run: yarn test:run

      - name: Build
        working-directory: frontend
        run: yarn build

      - name: Security audit
        working-directory: frontend
        # CI checks all deps for awareness, but non-blocking
        run: yarn npm audit --all --recursive --severity high
        continue-on-error: true

  deployment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Validate SQLite Compose config
        run: docker compose -f deploy/compose/docker-compose.yml config > /tmp/docker-compose.sqlite.yaml

      - name: Validate PostgreSQL Compose config
        env:
          POSTGRES_PASSWORD: ci-postgres-password
        run: docker compose -f deploy/compose/docker-compose.postgres.yml config > /tmp/docker-compose.postgres.yaml

      - name: Build production image
        run: docker build -t tarnished:ci .

      - name: Install Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a

      - name: Lint and render Helm chart scenarios
        run: |
          helm lint deploy/helm/tarnished
          helm template tarnished ./deploy/helm/tarnished > /tmp/helm-default.yaml
          helm template tarnished ./deploy/helm/tarnished --set cleanup.enabled=true > /tmp/helm-cleanup.yaml
          helm template tarnished ./deploy/helm/tarnished \
            --set postgresql.enabled=true \
            --set postgresql.password=ci-secret \
            > /tmp/helm-postgres.yaml
          helm template tarnished ./deploy/helm/tarnished \
            --set replicaCount=2 \
            --set postgresql.enabled=true \
            --set postgresql.password=ci-secret \
            --set persistence.accessMode=ReadWriteMany \
            > /tmp/helm-multi-replica-rwx.yaml
          helm template tarnished ./deploy/helm/tarnished \
            --set replicaCount=2 \
            --set postgresql.enabled=true \
            --set postgresql.password=ci-secret \
            --set persistence.existingClaim=tarnished-uploads \
            --set persistence.sharedAccess=true \
            > /tmp/helm-multi-replica-existing-claim.yaml

  extension:
    runs-on: ubuntu-latest
    # Only run if extension files changed
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Check for extension changes
        id: changes
        run: |
          BASE_SHA="$(git merge-base HEAD "origin/${{ github.base_ref }}")"
          if git diff --name-only "$BASE_SHA" HEAD | grep -q "^extension/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '22'

      - name: Enable Corepack
        if: steps.changes.outputs.changed == 'true'
        run: corepack enable

      - name: Cache yarn dependencies
        if: steps.changes.outputs.changed == 'true'
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: |
            ~/.cache/node
            extension/node_modules
          key: ${{ runner.os }}-yarn-ext-${{ hashFiles('extension/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-ext-

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        working-directory: extension
        run: yarn install --immutable

      - name: Prettier check
        if: steps.changes.outputs.changed == 'true'
        working-directory: extension
        run: npx prettier --check .

      - name: TypeScript
        if: steps.changes.outputs.changed == 'true'
        working-directory: extension
        run: npx tsc --noEmit

      - name: Vitest
        if: steps.changes.outputs.changed == 'true'
        working-directory: extension
        run: yarn test:run

      - name: Build
        if: steps.changes.outputs.changed == 'true'
        working-directory: extension
        run: yarn build
